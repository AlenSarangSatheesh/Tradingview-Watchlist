<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unlimited Watchlists for TradingView</title>
  <style>
:root {
  --bg: #111;
  --surface: #1e1e1e;
  --surface-2: #1a1a1a;
  --input-bg: #2a2a2a;
  --border: #333;
  --border-2: #444;
  --text: #eee;
  --text-muted: #888;
  --btn-bg: #2b2b2b;
  --btn-hover: #3a3a3a;
  --row-hover: #222;
  --accent: #0057ff;
  --focus: #628ce1;
  --tooltip-bg: #333;
  --tooltip-text: #fff;
  --toast-bg: #323232;
  --menu-bg: #1e1e1e;
  --menu-hover: #2a2a2a;
  --footer-bg: #1a1a1a;
  --footer-text: #777;
  --icon-invert: 1;
}

body.light {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface-2: #eceef1;
  --input-bg: #ffffff;
  --border: #d6d9de;
  --border-2: #c2c6cc;
  --text: #1e222d;
  --text-muted: #6b7280;
  --btn-bg: #e7e9ee;
  --btn-hover: #d7dae0;
  --row-hover: #eef0f3;
  --accent: #0057ff;
  --focus: #628ce1;
  --tooltip-bg: #333;
  --tooltip-text: #fff;
  --toast-bg: #323232;
  --menu-bg: #ffffff;
  --menu-hover: #eef0f3;
  --footer-bg: #eceef1;
  --footer-text: #888;
  --icon-invert: 0;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0 0 30px 0;
  background: var(--bg);
  color: var(--text);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.actions {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
}

h2 {
  margin: 0;
  font-size: 16px;
}

/* Search container styling */
.search-container {
  position: sticky;
  top: 49px;
  padding: 6px 10px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  z-index: 99;
}

.search-input {
  width: 100%;
  padding: 6px 26px 6px 10px;
  background: var(--input-bg);
  border: 1px solid var(--border-2);
  border-radius: 3px;
  color: var(--text);
  font-size: 12px;
  box-sizing: border-box;
  outline: none;
  transition: border-color 0.2s ease;
  height: 28px;
}

.search-input:focus {
  border-color: var(--focus);
}

.search-input::placeholder {
  color: var(--text-muted);
  font-size: 12px;
}

.clear-search-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 0;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.clear-search-btn:hover {
  background: var(--btn-hover);
  color: var(--text);
}

/* Icon styling */
.icon {
  width: 14px;
  height: 14px;
  filter: invert(var(--icon-invert));
  opacity: 0.9;
}

.icon.small {
  width: 12px;
  height: 12px;
}

.actions button, #backBtn {
  background: var(--btn-bg);
  color: var(--text);
  border: none;
  padding: 6px 8px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 28px;
  position: relative;
}

.actions button:hover, #backBtn:hover {
  background: var(--btn-hover);
}

.actions button:hover .icon, #backBtn:hover .icon {
  opacity: 1;
}

#sortBtn {
  background: var(--btn-bg);
}

#sortBtn:hover {
  background: var(--btn-hover);
}

#clearAllBtn {
  background: #d32f2f;
}

#clearAllBtn:hover {
  background: #b71c1c;
}

#clearAllBtn .icon {
  filter: invert(1);
}

/* Tooltip styling */
.tooltip {
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--tooltip-bg);
  color: var(--tooltip-text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 1000;
  margin-top: 5px;
}

.actions button:hover .tooltip,
#backBtn:hover .tooltip {
  opacity: 1;
}

.watchlist {
  list-style: none;
  padding: 0;
  margin: 0;
}

/* Stock list item styling */
.watchlist li {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 40px;
  position: relative;
  transition: background 0.2s ease;
}

.watchlist li:hover {
  background: var(--row-hover);
}

.watchlist li.active {
  background: var(--accent);
  color: #fff;
}

.watchlist li.active .icon {
  filter: invert(1);
}

/* Selected watchlist styling */
.watchlist li.selected {
  background: var(--input-bg);
  border-left: 3px solid var(--accent);
}

/* Drag and drop styling */
.watchlist li[draggable="true"] {
  user-select: none;
}

.watchlist li.dragging {
  opacity: 0.4;
  background: var(--border);
  border: 2px dashed var(--accent);
}

.watchlist li.drag-over {
  border-top: 3px solid var(--accent);
  background: rgba(0, 87, 255, 0.1);
}

/* Main content container (everything except delete button) */
.stock-main-content {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
  position: relative;
}

/* Stock name styling */
.stock-name {
  font-weight: 500;
  min-width: 60px;
  font-size: 14px;
  flex: 1;
  margin-right: 8px;
}

/* Delete button styling - positioned in right corner */
.delete-btn-right {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 3px;
  background: transparent;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  padding: 2px;
  flex-shrink: 0;
  margin-left: 8px;
}

.delete-btn-right:hover {
  background: #d32f2f;
  transform: scale(1.05);
}

.delete-btn-right .icon {
  filter: invert(var(--icon-invert));
  opacity: 0.6;
  width: 12px;
  height: 12px;
  transition: opacity 0.2s ease;
}

.delete-btn-right:hover .icon {
  opacity: 1;
  filter: invert(1);
}

/* Chartink re-sync button on watchlist rows */
.resync-btn {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 3px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px;
  flex-shrink: 0;
  margin-left: 8px;
}

.resync-btn:hover {
  background: var(--accent);
}

.resync-btn .icon {
  filter: invert(var(--icon-invert));
  opacity: 0.6;
  width: 12px;
  height: 12px;
  transition: opacity 0.2s ease;
}

.resync-btn:hover .icon {
  opacity: 1;
  filter: invert(1);
}

.resync-btn.syncing {
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Button group container */
.stock-buttons-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--toast-bg);
  color: #fff;
  padding: 10px 15px;
  border-radius: 5px;
  opacity: 0;
  transform: translateX(100%);
  transition: all 0.3s ease;
  z-index: 1000;
  font-size: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  max-width: 300px;
  word-wrap: break-word;
}

.toast.show {
  opacity: 1;
  transform: translateX(0);
}

/* Import dropdown menu */
.import-menu {
  position: fixed;
  background: var(--menu-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  z-index: 2000;
  min-width: 175px;
  overflow: hidden;
}

.import-menu-item {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
}

.import-menu-item:hover {
  background: var(--menu-hover);
}

.import-menu-item + .import-menu-item {
  border-top: 1px solid var(--border);
}

/* Settings modal */
.settings-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
}

.settings-content {
  background: var(--surface);
  color: var(--text);
  width: 86%;
  max-width: 320px;
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.settings-header h3 {
  margin: 0;
  font-size: 16px;
}

.settings-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

.settings-close:hover {
  background: var(--btn-hover);
  color: var(--text);
}

.settings-body {
  padding: 16px;
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.settings-label {
  font-size: 13px;
  font-weight: 600;
}

.theme-toggle {
  display: flex;
  border: 1px solid var(--border-2);
  border-radius: 6px;
  overflow: hidden;
}

.theme-opt {
  background: var(--btn-bg);
  color: var(--text);
  border: none;
  padding: 6px 14px;
  font-size: 12px;
  cursor: pointer;
}

.theme-opt + .theme-opt {
  border-left: 1px solid var(--border-2);
}

.theme-opt.active {
  background: var(--accent);
  color: #fff;
}

.settings-section {
  border-top: 1px solid var(--border);
  padding-top: 14px;
}

.settings-note {
  font-size: 12px;
  color: var(--text-muted);
  margin: 0 0 10px 0;
}

.settings-mail {
  display: inline-block;
  text-decoration: none;
  background: var(--accent);
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
}

.settings-mail:hover {
  filter: brightness(1.1);
}

/* Footer */
.app-footer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--footer-bg);
  border-top: 1px solid var(--border);
  color: var(--footer-text);
  font-size: 11px;
  text-align: center;
  padding: 6px 8px;
  z-index: 90;
}

.watchlist li.hidden {
  display: none;
}

@media (max-width: 400px) {
  .stock-name {
    min-width: 45px;
    font-size: 12px;
  }

  .delete-btn-right {
    width: 20px;
    height: 20px;
    margin-left: 4px;
  }

  .delete-btn-right .icon {
    width: 9px;
    height: 9px;
  }
}
  </style>
</head>
<body>
  <div id="watchlistView">
    <div class="header">
      <h2>Watchlists</h2>
      <div class="actions">
        <button id="newBtn">
          <img src="Images/New.png" alt="New" class="icon">
          <div class="tooltip">New Watchlist</div>
        </button>
        <button id="importBtn">
          <img src="Images/import.png" alt="Import" class="icon">
          <div class="tooltip">Import</div>
        </button>
        <button id="renameBtn">
          <img src="Images/rename.png" alt="Rename" class="icon">
          <div class="tooltip">Rename Watchlist</div>
        </button>
        <button id="deleteBtn">
          <img src="Images/delete.png" alt="Delete" class="icon">
          <div class="tooltip">Delete Watchlist</div>
        </button>
        <button id="settingsBtn">
          <img src="Images/settings.png" alt="Settings" class="icon">
          <div class="tooltip">Settings</div>
        </button>
      </div>
    </div>
    <input type="file" id="importCsvInput" accept=".csv" style="display:none;">
    <ul id="watchlistContainer" class="watchlist"></ul>
  </div>

  <div id="stocksView" style="display:none;">
    <div class="header">
      <button id="backBtn">
        <img src="Images/Back.png" alt="Back" class="icon">
        <div class="tooltip">Back</div>
      </button>
      <h2 id="watchlistTitle"></h2>
      <div class="actions">
        <input type="file" id="csvInput" accept=".csv" style="display:none;">
        <button id="sortBtn">
          <img src="Images/sort.png" alt="Sort" class="icon">
          <div class="tooltip">Sort A–Z</div>
        </button>
        <button id="importStocksBtn">
          <img src="Images/import.png" alt="Import" class="icon">
          <div class="tooltip">Import</div>
        </button>
        <button id="clearAllBtn">
          <img src="Images/delete.png" alt="Clear All" class="icon">
          <div class="tooltip">Clear All Stocks</div>
        </button>
      </div>
    </div>

    <div class="search-container">
      <input type="text" id="stockSearchInput" placeholder="Search stocks..." class="search-input">
      <button id="clearSearchBtn" class="clear-search-btn" style="display:none;">&times;</button>
    </div>

    <ul id="stocksContainer" class="watchlist"></ul>
  </div>

  <div id="settingsModal" class="settings-modal" style="display:none;">
    <div class="settings-content">
      <div class="settings-header">
        <h3>Settings</h3>
        <button id="closeSettings" class="settings-close">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <span class="settings-label">Appearance</span>
          <div class="theme-toggle">
            <button id="themeDark" class="theme-opt">Dark</button>
            <button id="themeLight" class="theme-opt">Light</button>
          </div>
        </div>
        <div class="settings-section">
          <p class="settings-note">Found a bug or have a feature idea? Let the developer know.</p>
          <a id="feedbackLink" class="settings-mail" target="_blank" rel="noopener"
             href="https://mail.google.com/mail/u/0/?fs=1&tf=cm&source=mailto&to=alensarangsatheesh@gmail.com&su=Unlimited%20Watchlists%20for%20TradingView%20%E2%80%93%20Feedback">
             Report a problem / Suggest a feature
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="app-footer">Developed by Alen Sarang Satheesh</div>

  <script src="sidepanel.js"></script>
</body>
</html>
